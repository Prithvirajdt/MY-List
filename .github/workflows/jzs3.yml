name: Update merged Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------
      # CHECKOUT REPOSITORY
      # --------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------
      # DOWNLOAD PLAYLISTS
      # --------------------------------------------
      - name: Download playlists
        run: |
          mkdir -p work

          curl -L \
            "https://raw.githubusercontent.com/Prithvirajdt/MY-List/refs/heads/main/sources/jai.ent" \
            -o work/jai.ent

          curl -L \
            "https://raw.githubusercontent.com/Prithvirajdt/MY-List/refs/heads/main/sources/jai2.ent" \
            -o work/jai2.ent

      # --------------------------------------------
      # MERGE GROUP TITLES
      # --------------------------------------------
      - name: Merge group titles
        run: |
          python << 'EOF'
          import re
          import os

          with open("work/jai.ent", "r", encoding="utf-8", errors="ignore") as f:
              jai = f.read().splitlines()

          with open("work/jai2.ent", "r", encoding="utf-8", errors="ignore") as f:
              jai2 = f.read().splitlines()

          # Build channel name -> group-title map from jai.ent
          group_map = {}

          for line in jai:
              if line.startswith("#EXTINF"):
                  name_match = re.search(r',\s*(.*)$', line)
                  group_match = re.search(r'group-title="([^"]*)"', line)

                  if name_match and group_match:
                      channel_name = name_match.group(1).strip().lower()
                      group_title = group_match.group(1)
                      group_map[channel_name] = group_title

          output = []

          for line in jai2:
              if line.startswith("#EXTINF"):
                  name_match = re.search(r',\s*(.*)$', line)

                  if name_match:
                      channel_name = name_match.group(1).strip().lower()

                      if channel_name in group_map:
                          new_group = group_map[channel_name]

                          if 'group-title="' in line:
                              line = re.sub(
                                  r'group-title="[^"]*"',
                                  f'group-title="{new_group}"',
                                  line
                              )

                  output.append(line)
              else:
                  output.append(line)

          os.makedirs("sources", exist_ok=True)

          with open("sources/merged.ent", "w", encoding="utf-8", newline="\n") as f:
              f.write("\n".join(output))

          print("Created sources/merged.ent")
          EOF

      # --------------------------------------------
      # COMMIT & PUSH IF CHANGED
      # --------------------------------------------
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add sources/merged.ent

          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "Update merged playlist"
            git push
          fi
