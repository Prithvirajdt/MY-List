name: Update merged Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------
      # CHECKOUT
      # --------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------
      # DOWNLOAD PLAYLISTS
      # --------------------------------------------
      - name: Download playlists
        run: |
          mkdir -p work

          curl -L \
            "https://raw.githubusercontent.com/Prithvirajdt/MY-List/refs/heads/main/sources/jai.ent" \
            -o work/jai.ent

          curl -L \
            "https://raw.githubusercontent.com/Prithvirajdt/MY-List/refs/heads/main/sources/jai2.ent" \
            -o work/jai2.ent

      # --------------------------------------------
      # MERGE GROUP TITLES
      # --------------------------------------------
      - name: Merge playlists
        run: |
          python << 'EOF'
          import re

          with open("work/jai.ent", "r", encoding="utf-8", errors="ignore") as f:
              jai = f.read().splitlines()

          with open("work/jai2.ent", "r", encoding="utf-8", errors="ignore") as f:
              jai2 = f.read().splitlines()

          # Build name -> group-title map from jai.ent
          group_map = {}

          for line in jai:
              if line.startswith("#EXTINF"):
                  m_name = re.search(r',\s*(.*)$', line)
                  m_group = re.search(r'group-title="([^"]*)"', line)

                  if m_name:
                      name = m_name.group(1).strip()
                      group = m_group.group(1) if m_group else ""

                      if name:
                          group_map[name.lower()] = group

          output = ["#EXTM3U"]

          i = 0
          while i < len(jai2):
              line = jai2[i]

              if line.startswith("#EXTINF"):
                  extinf = line

                  name_match = re.search(r',\s*(.*)$', extinf)
                  channel_name = (
                      name_match.group(1).strip()
                      if name_match else ""
                  )

                  new_group = group_map.get(channel_name.lower())

                  if new_group is not None:
                      if 'group-title="' in extinf:
                          extinf = re.sub(
                              r'group-title="[^"]*"',
                              f'group-title="{new_group}"',
                              extinf
                          )
                      else:
                          extinf = extinf.replace(
                              "#EXTINF:-1",
                              f'#EXTINF:-1 group-title="{new_group}"',
                              1
                          )

                  output.append(extinf)

                  if i + 1 < len(jai2):
                      output.append(jai2[i + 1])

                  i += 2
              else:
                  i += 1

          with open("merged.ent", "w", encoding="utf-8") as f:
              f.write("\n".join(output))

          print("merged.ent created")
          EOF

      # --------------------------------------------
      # COMMIT CHANGES
      # --------------------------------------------
      - name: Commit merged playlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add merged.ent

          git diff --cached --quiet || (
            git commit -m "Update merged playlist"
            git push
          )
