name: Update Master Playlist

on:
workflow_dispatch:

schedule:
- cron: '30 */2 * * *'

jobs:
merge:
runs-on: ubuntu-latest

steps:

  # =====================================================
  # CHECKOUT REPOSITORY
  # =====================================================
  - name: Checkout repository
    uses: actions/checkout@v4

  # =====================================================
  # CREATE SOURCES FOLDER
  # =====================================================
  - name: Create sources folder
    run: mkdir -p sources

  # =====================================================
  # DOWNLOAD PLAYLISTS
  # =====================================================
  - name: Download playlists
    run: |
      wget -q -O sources/jai.ent \
      https://raw.githubusercontent.com/Prithvirajdt/MY-List/refs/heads/main/sources/jai.ent

      wget -q -O sources/jai2.ent \
      https://raw.githubusercontent.com/Prithvirajdt/MY-List/refs/heads/main/sources/jai2.ent

  # =====================================================
  # MERGE PLAYLISTS
  # =====================================================
  - name: Build merged playlist
    run: |
      python3 << 'PY'
      import re

      MASTER_FILE = "sources/jai.ent"
      SECONDARY_FILE = "sources/jai2.ent"
      OUTPUT_FILE = "sources/merged.ent"

      # -------------------------------------------------
      # Parse M3U playlist
      # -------------------------------------------------
      def parse_playlist(filename):

          channels = []

          with open(
              filename,
              encoding="utf-8",
              errors="ignore"
          ) as f:
              lines = f.readlines()

          i = 0

          while i < len(lines):

              line = lines[i].rstrip("\n")

              if line.startswith("#EXTINF"):

                  extinf = line

                  url = ""

                  if i + 1 < len(lines):
                      url = lines[i + 1].strip()

                  name = extinf.split(",")[-1].strip()

                  tvg_id = ""
                  group_title = ""

                  m = re.search(
                      r'tvg-id="([^"]*)"',
                      extinf
                  )
                  if m:
                      tvg_id = m.group(1).strip()

                  m = re.search(
                      r'group-title="([^"]*)"',
                      extinf
                  )
                  if m:
                      group_title = m.group(1).strip()

                  channels.append({
                      "extinf": extinf,
                      "url": url,
                      "name": name,
                      "tvg_id": tvg_id,
                      "group": group_title
                  })

                  i += 2

              else:
                  i += 1

          return channels

      # -------------------------------------------------
      # Read both playlists
      # -------------------------------------------------
      master_channels = parse_playlist(MASTER_FILE)
      secondary_channels = parse_playlist(SECONDARY_FILE)

      # -------------------------------------------------
      # Build group-title lookup from MASTER
      # -------------------------------------------------
      group_lookup = {}

      for ch in master_channels:

          if ch["tvg_id"]:
              group_lookup[
                  "id:" + ch["tvg_id"].lower()
              ] = ch["group"]

          group_lookup[
              "name:" + ch["name"].lower()
          ] = ch["group"]

      # -------------------------------------------------
      # Generate unique channel key
      # -------------------------------------------------
      def channel_key(channel):

          if channel["tvg_id"]:
              return (
                  "id:" +
                  channel["tvg_id"].lower()
              )

          return (
              "name:" +
              channel["name"].lower()
          )

      merged = []
      seen = set()

      # -------------------------------------------------
      # STEP 1
      # Add all MASTER channels first
      # -------------------------------------------------
      for ch in master_channels:

          key = channel_key(ch)

          if key not in seen:
              merged.append(ch)
              seen.add(key)

      # -------------------------------------------------
      # STEP 2
      # Add missing channels from SECONDARY
      # -------------------------------------------------
      for ch in secondary_channels:

          key = channel_key(ch)

          if key in seen:
              continue

          group = None

          if ch["tvg_id"]:
              group = group_lookup.get(
                  "id:" +
                  ch["tvg_id"].lower()
              )

          if not group:
              group = group_lookup.get(
                  "name:" +
                  ch["name"].lower()
              )

          if group:

              if 'group-title="' in ch["extinf"]:

                  ch["extinf"] = re.sub(
                      r'group-title="[^"]*"',
                      f'group-title="{group}"',
                      ch["extinf"]
                  )

              else:

                  ch["extinf"] = ch["extinf"].replace(
                      "#EXTINF:-1",
                      f'#EXTINF:-1 group-title="{group}"',
                      1
                  )

          merged.append(ch)
          seen.add(key)

      # -------------------------------------------------
      # Sort channels alphabetically
      # -------------------------------------------------
      merged.sort(
          key=lambda x: (
              x["group"].lower(),
              x["name"].lower()
          )
      )

      # -------------------------------------------------
      # Write final playlist
      # -------------------------------------------------
      with open(
          OUTPUT_FILE,
          "w",
          encoding="utf-8"
      ) as out:

          out.write("#EXTM3U\n\n")

          for ch in merged:

              out.write(
                  ch["extinf"] + "\n"
              )

              out.write(
                  ch["url"] + "\n"
              )

      print(
          f"Created {OUTPUT_FILE} "
          f"with {len(merged)} channels"
      )

      PY

  # =====================================================
  # COMMIT CHANGES
  # =====================================================
  - name: Commit merged playlist
    run: |
      git config user.name "github-actions"
      git config user.email "github-actions@github.com"

      git add sources/merged.ent

      git commit -m "Update merged playlist" || echo "No changes"

      git push
