name: Update Master Playlist

on:
workflow_dispatch:
schedule:
- cron: '0 */2 * * *'

jobs:
build:
runs-on: ubuntu-latest

steps:

  # --------------------------------------------
  # STEP 1: CHECKOUT
  # --------------------------------------------
  - name: Checkout repository
    uses: actions/checkout@v4

  # --------------------------------------------
  # STEP 2: PREPARE FOLDER
  # --------------------------------------------
  - name: Prepare sources folder
    run: mkdir -p sources

  # --------------------------------------------
  # STEP 3: DOWNLOAD PLAYLISTS
  # --------------------------------------------
  - name: Download playlists
    run: |
      set -e

      wget -q -O sources/jai.ent \
      https://raw.githubusercontent.com/Prithvirajdt/MY-List/refs/heads/main/sources/jai.ent

      wget -q -O sources/jai2.ent \
      https://raw.githubusercontent.com/Prithvirajdt/MY-List/refs/heads/main/sources/jai2.ent

  # --------------------------------------------
  # STEP 4: MERGE PLAYLISTS
  # --------------------------------------------
  - name: Merge playlists
    run: |
      python3 << 'PY'
      import re

      master_file = "sources/jai.ent"
      secondary_file = "sources/jai2.ent"
      output_file = "sources/merged.ent"

      def parse_playlist(path):
          channels = []

          with open(path, encoding="utf-8", errors="ignore") as f:
              lines = f.readlines()

          i = 0

          while i < len(lines):

              if lines[i].startswith("#EXTINF"):

                  extinf = lines[i].rstrip()

                  url = ""
                  if i + 1 < len(lines):
                      url = lines[i + 1].strip()

                  name = extinf.split(",")[-1].strip()

                  tvg = ""

                  m = re.search(
                      r'tvg-id="([^"]*)"',
                      extinf
                  )

                  if m:
                      tvg = m.group(1)

                  group = ""

                  m = re.search(
                      r'group-title="([^"]*)"',
                      extinf
                  )

                  if m:
                      group = m.group(1)

                  channels.append({
                      "extinf": extinf,
                      "url": url,
                      "name": name,
                      "tvg": tvg,
                      "group": group
                  })

                  i += 2

              else:
                  i += 1

          return channels

      master = parse_playlist(master_file)
      secondary = parse_playlist(secondary_file)

      group_map = {}

      for ch in master:

          if ch["tvg"]:
              group_map[
                  "id:" + ch["tvg"].lower()
              ] = ch["group"]

          group_map[
              "name:" + ch["name"].lower()
          ] = ch["group"]

      merged = []
      seen = set()

      def get_key(ch):

          if ch["tvg"]:
              return "id:" + ch["tvg"].lower()

          return "name:" + ch["name"].lower()

      # Add all channels from jai.ent first
      for ch in master:

          key = get_key(ch)

          if key not in seen:
              merged.append(ch)
              seen.add(key)

      # Add only missing channels from jai2.ent
      for ch in secondary:

          key = get_key(ch)

          if key in seen:
              continue

          group = None

          if ch["tvg"]:
              group = group_map.get(
                  "id:" + ch["tvg"].lower()
              )

          if not group:
              group = group_map.get(
                  "name:" + ch["name"].lower()
              )

          if group:

              if 'group-title="' in ch["extinf"]:

                  ch["extinf"] = re.sub(
                      r'group-title="[^"]*"',
                      f'group-title="{group}"',
                      ch["extinf"]
                  )

          merged.append(ch)
          seen.add(key)

      with open(output_file, "w", encoding="utf-8") as out:

          out.write("#EXTM3U\n\n")

          for ch in merged:
              out.write(ch["extinf"] + "\n")
              out.write(ch["url"] + "\n")

      print(
          f"Merged playlist created with {len(merged)} channels"
      )

      PY

  # --------------------------------------------
  # STEP 5: COMMIT
  # --------------------------------------------
  - name: Commit and push
    run: |
      git config user.name "github-actions"
      git config user.email "github-actions@github.com"
      git add sources/merged.ent
      git commit -m "Update merged playlist" || echo "No changes"
      git push
